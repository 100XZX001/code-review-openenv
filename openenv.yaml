name: code_review_env
version: 1.0.0
description: Code review environment with 5 tasks, multi-turn interaction, and code fix proposal
author: yuvraj gupta
license: MIT
tasks:
  - id: easy
    description: Add a helpful comment about missing null check
  - id: medium
    description: Suggest using enumerate for efficiency
  - id: hard
    description: Point out division by zero risk with empty list
  - id: harder
    description: Identify race condition in multithreaded counter
  - id: hardest
    description: Detect potential deadlock in lock ordering
observation_space:
  type: object
  properties:
    pr_title:
      type: string
    pr_description:
      type: string
    code_snippet:
      type: string
    comments:
      type: array
      items:
        type: string
    test_results:
      type: string
    step:
      type: integer
    done:
      type: boolean
action_space:
  type: object
  properties:
    action_type:
      type: string
      enum:
        - write_comment
        - skip
        - done
        - ask_question
        - propose_fix
    comment_text:
      type: string
    question:
      type: string
    fix_code:
      type: string
